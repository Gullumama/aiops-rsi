apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent
  namespace: aiops

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-agent-reader
rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - pods/status
  verbs: ["get", "list", "watch"]

- apiGroups: [""]
  resources:
    - events
  verbs: ["get", "list", "watch"]

- apiGroups: [""]
  resources:
    - services
    - endpoints
  verbs: ["get", "list"]

- apiGroups: [""]
  resources:
    - configmaps
    - secrets
  verbs: ["get", "list"]

- apiGroups: [""]
  resources:
    - persistentvolumes
    - persistentvolumeclaims
  verbs: ["get", "list", "watch"]

- apiGroups: [""]
  resources:
    - nodes
    - nodes/status
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-agent-remediator
rules:
- apiGroups: [""]
  resources:
    - pods
  verbs: ["delete", "patch", "update"]

- apiGroups: ["apps"]
  resources:
    - deployments
    - deployments/scale
    - deployments/rollback
    - statefulsets
    - statefulsets/scale
    - daemonsets
  verbs: ["get", "list", "patch", "update"]

- apiGroups: ["apps"]
  resources:
    - replicasets
  verbs: ["get", "list"]

- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["get", "list"]

- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
    - nodes
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-agent-reader-binding
subjects:
- kind: ServiceAccount
  name: aiops-agent
  namespace: aiops
roleRef:
  kind: ClusterRole
  name: aiops-agent-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-agent-remediator-binding
subjects:
- kind: ServiceAccount
  name: aiops-agent
  namespace: aiops
roleRef:
  kind: ClusterRole
  name: aiops-agent-remediator
  apiGroup: rbac.authorization.k8s.io