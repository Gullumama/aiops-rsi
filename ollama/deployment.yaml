apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: aiops
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 11434
          name: api
        
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        
        livenessProbe:
          httpGet:
            path: /api/tags
            port: api
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/tags
            port: api
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      
      volumes:
      - name: ollama-storage
        emptyDir:
          sizeLimit: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: aiops
  labels:
    app: ollama
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
  - name: api
    port: 11434
    targetPort: api
    protocol: TCP