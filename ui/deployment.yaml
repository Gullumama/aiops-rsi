apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-ui
  namespace: aiops
  labels:
    app: aiops-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops-ui
  template:
    metadata:
      labels:
        app: aiops-ui
    spec:
      containers:
      - name: aiops-ui
        image: aiops-ui:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 3000
          name: http
        
        env:
        - name: REACT_APP_API_URL
          value: "http://aiops-agent.aiops:8080"
        
        - name: REACT_APP_WS_URL
          value: "ws://aiops-agent.aiops:8080"
        
        - name: REACT_APP_K8SGPT_URL
          value: "http://k8sgpt.aiops:8080"
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: aiops-ui
  namespace: aiops
spec:
  type: LoadBalancer
  selector:
    app: aiops-ui
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http